<h2 style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;">点数推移画面のイメージ。各プレイヤーの累計得点をラックごとの折れ線グラフで表示し、10ラックずつページ送りで最大50ラックまで遡れます。グラフの下には補助的な点数表があります。</h2>

<div style="display:flex; gap:6px; margin-bottom:1rem;">
  <button style="flex:1; padding:8px 0; border-radius:var(--border-radius-md); border:0.5px solid var(--color-border-tertiary); background:transparent; color:var(--color-text-secondary); font-size:14px; cursor:default;">スコア</button>
  <button style="flex:1; padding:8px 0; border-radius:var(--border-radius-md); border:none; background:var(--color-background-info); color:var(--color-text-info); font-size:14px; font-weight:500; cursor:default;">推移</button>
</div>

<div id="legend" style="display:flex; flex-wrap:wrap; gap:14px; margin-bottom:1rem; font-size:12px; color:var(--color-text-secondary);"></div>

<div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;">
  <button id="prevBtn" onclick="changePage(-1)" style="display:flex; align-items:center; gap:4px; font-size:13px;"><i class="ti ti-chevron-left" aria-hidden="true" style="font-size:15px;"></i>前の10ラック</button>
  <span id="pageLabel" style="font-size:13px; color:var(--color-text-secondary);"></span>
  <button id="nextBtn" onclick="changePage(1)" style="display:flex; align-items:center; gap:4px; font-size:13px;">次の10ラック<i class="ti ti-chevron-right" aria-hidden="true" style="font-size:15px;"></i></button>
</div>

<div style="position:relative; width:100%; height:260px; margin-bottom:1.25rem;">
  <canvas id="progressChart" role="img" aria-label="ラックごとの累計得点推移を示す折れ線グラフ">プレイヤーごとの累計得点推移</canvas>
</div>

<table style="width:100%; border-collapse:collapse; font-size:12px; table-layout:fixed;">
  <thead>
    <tr style="border-bottom:0.5px solid var(--color-border-secondary);">
      <th style="text-align:left; padding:5px 4px; font-weight:500; color:var(--color-text-tertiary); font-size:11px;">ラック</th>
      <th style="text-align:right; padding:5px 4px; font-weight:500; color:var(--color-text-tertiary); font-size:11px;">プレイヤー1</th>
      <th style="text-align:right; padding:5px 4px; font-weight:500; color:var(--color-text-tertiary); font-size:11px;">プレイヤー2</th>
      <th style="text-align:right; padding:5px 4px; font-weight:500; color:var(--color-text-tertiary); font-size:11px;">プレイヤー3</th>
      <th style="text-align:right; padding:5px 4px; font-weight:500; color:var(--color-text-tertiary); font-size:11px;">プレイヤー4</th>
    </tr>
  </thead>
  <tbody id="rackTableBody"></tbody>
</table>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const players = [
  {name:'プレイヤー1', color:'#B5623A', dash:[]},
  {name:'プレイヤー2', color:'#5E8267', dash:[6,3]},
  {name:'プレイヤー3', color:'#AD8434', dash:[2,2]},
  {name:'プレイヤー4', color:'#7C5C9E', dash:[8,3,2,3]}
];
const totalRacks = 24;
const pageSize = 10;
const maxPage = Math.ceil(totalRacks/pageSize)-1;
let currentPage = maxPage;

function genData(){
  const d = players.map(()=>[]);
  for(let r=0;r<totalRacks;r++){
    const winner = Math.floor(Math.random()*players.length);
    const pts = [1,2,4][Math.floor(Math.random()*3)];
    const masuwari = Math.random()<0.15;
    const mult = masuwari ? 2 : 1;
    for(let p=0;p<players.length;p++){
      d[p].push(p===winner ? pts*(players.length-1)*mult : -pts*mult);
    }
  }
  return d;
}
const deltas = genData();
const cumulative = deltas.map(arr=>{
  let sum=0;
  return arr.map(v=>{ sum+=v; return sum; });
});

const legendEl = document.getElementById('legend');
legendEl.innerHTML = players.map(p=>`
  <span style="display:flex; align-items:center; gap:6px;">
    <svg width="18" height="8" aria-hidden="true"><line x1="0" y1="4" x2="18" y2="4" stroke="${p.color}" stroke-width="2" stroke-dasharray="${p.dash.join(',')}"/></svg>
    ${p.name}
  </span>`).join('');

const isDark = matchMedia('(prefers-color-scheme: dark)').matches;
const axisColor = isDark ? '#A8A6A0' : '#5F5E5A';
const gridColor = isDark ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.06)';

const ctx = document.getElementById('progressChart');
const chart = new Chart(ctx, {
  type:'line',
  data:{
    labels: [],
    datasets: players.map((p,i)=>({
      label: p.name,
      data: [],
      borderColor: p.color,
      backgroundColor: p.color,
      pointBackgroundColor: p.color,
      borderDash: p.dash,
      borderWidth: 2,
      pointRadius: 3,
      tension: 0.15
    }))
  },
  options:{
    responsive:true,
    maintainAspectRatio:false,
    interaction:{ mode:'index', intersect:false },
    plugins:{ legend:{ display:false } },
    scales:{
      x:{ ticks:{ color:axisColor, autoSkip:false }, grid:{ color:gridColor } },
      y:{ ticks:{ color:axisColor }, grid:{ color:gridColor } }
    }
  }
});

function updateChart(){
  const start = currentPage*pageSize;
  const end = Math.min(start+pageSize, totalRacks);
  const labels = [];
  for(let r=start;r<end;r++) labels.push(String(r+1));
  chart.data.labels = labels;
  chart.data.datasets.forEach((ds,i)=>{ ds.data = cumulative[i].slice(start,end); });
  chart.update();
}
function updateTable(){
  const start = currentPage*pageSize;
  const end = Math.min(start+pageSize, totalRacks);
  let rows = '';
  for(let r=start;r<end;r++){
    rows += `<tr style="border-bottom:0.5px solid var(--color-border-tertiary);"><td style="padding:5px 4px; color:var(--color-text-tertiary);">${r+1}</td>` +
      players.map((p,pi)=>{
        const v = deltas[pi][r];
        return `<td style="padding:5px 4px; text-align:right; color:${v>0?p.color:'var(--color-text-tertiary)'};">${v>0?'+':''}${v}</td>`;
      }).join('') + `</tr>`;
  }
  document.getElementById('rackTableBody').innerHTML = rows;
}
function updatePagerUI(){
  const start = currentPage*pageSize+1;
  const end = Math.min((currentPage+1)*pageSize, totalRacks);
  document.getElementById('pageLabel').textContent = `ラック ${start}-${end} / ${totalRacks}`;
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  prevBtn.style.opacity = currentPage<=0 ? '0.4' : '1';
  prevBtn.style.pointerEvents = currentPage<=0 ? 'none' : 'auto';
  nextBtn.style.opacity = currentPage>=maxPage ? '0.4' : '1';
  nextBtn.style.pointerEvents = currentPage>=maxPage ? 'none' : 'auto';
}
function changePage(delta){
  const newPage = currentPage+delta;
  if(newPage<0 || newPage>maxPage) return;
  currentPage = newPage;
  updateChart();
  updateTable();
  updatePagerUI();
}
updateChart();
updateTable();
updatePagerUI();
</script>
